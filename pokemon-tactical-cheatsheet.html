                        const protectionList = protectionListItems
                            ? `<ul class="protection-list">${protectionListItems}</ul>`
                            : '<div style="font-size: 12px; color: #666;">No direct coverage</div>';

                        return `
                            <div style="margin-top: 12px; padding: 10px; background: rgba(168,184,255,0.08); border-left: 2px solid #a8b8ff; border-radius: 4px;">
                                <div style="font-size: 13px; font-weight: 700; color: #ffffff; margin-bottom: 10px;">🚫 PROTECTS AGAINST ➔</div>
                                ${protectionList}
                            </div>
                        `;
                    }).join('');

                    // Column 1: Sprites with paired metadata in capsules
                    const front2CapsuleHtml = squadData.front2.map(member => {
                        const baseData = database[member.pokemonName];
                        const spriteUrl = baseData.sprite || `https://raw.githubusercontent.com/PokeAPI/sprites/master/pokemon/other/official-artwork/${getPokemonId(member.pokemonName)}.png`;
                        const memberData = applyAbilityModifiers(member.pokemonName, baseData, member.ability);
                        const stabTypes = getStabTypes(member.pokemonName);
                        const offensiveCoverage = Array.from(getOffensiveCoverage(stabTypes)).slice(0, 4);
                        const weaknesses = getWeaknesses(memberData.damage_from);
                        const weaknessTypes = weaknesses.slice(0, 4).map(w => w.type);
                        const strengths = getStrengths(memberData.damage_from);
                        const immuneTypes = strengths.filter(s => s.label === 'Immune').map(s => s.type);
                        const resistTypes = strengths.filter(s => s.label !== 'Immune').map(s => s.type);

                        const threatBadges = offensiveCoverage.map(t =>
                            `<div class="type-badge type-${t}" style="font-size: 1.1em; padding: 6px 12px;">${t}</div>`
                        ).join('');
                        const weakBadges = weaknessTypes.map(t =>
                            `<div class="type-badge type-${t}" style="font-size: 1.1em; padding: 6px 12px;">${t}</div>`
                        ).join('');
                        const resistBadges = resistTypes.map(t =>
                            `<div class="type-badge type-${t}" style="font-size: 1em; padding: 5px 10px; opacity: 0.85;">${t}</div>`
                        ).join('');
                        const immuneBadges = immuneTypes.map(t =>
                            `<div class="type-badge type-${t}" style="font-size: 1em; padding: 5px 10px; background: rgba(255,255,255,0.15);">${t}</div>`
                        ).join('');

                        return `
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                                <div class="squad-sprite" style="background-image: url('${spriteUrl}')" title="${capitalize(member.pokemonName)}"></div>
                                <div style="padding: 8px; background: rgba(125,211,252,0.08); border-left: 2px solid #7dd3fc; border-radius: 4px;">
                                    <div style="font-size: 11px; font-weight: 700; color: #ffffff; margin-bottom: 6px;">⚔️ THREATENS</div>
                                    <div style="display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 8px;">${threatBadges}</div>
                                    <div style="font-size: 11px; font-weight: 700; color: #ffffff; margin-bottom: 6px;">⚠️ WEAK TO</div>
                                    <div style="display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 8px;">${weakBadges}</div>
                                    ${resistBadges ? '<div style="font-size: 11px; font-weight: 700; color: #ffffff; margin-bottom: 6px;">🛡️ RESISTS</div><div style="display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 8px;">' + resistBadges + '</div>' : ''}
                                    ${immuneBadges ? '<div style="font-size: 11px; font-weight: 700; color: #ffffff; margin-bottom: 6px;">🔒 IMMUNE</div><div style="display: flex; gap: 3px; flex-wrap: wrap;">' + immuneBadges + '</div>' : ''}
                                </div>
                            </div>
                        `;
                    }).join('');

                    const back2CapsuleHtml = squadData.back2.map(member => {
                        const baseData = database[member.pokemonName];
                        const spriteUrl = baseData.sprite || `https://raw.githubusercontent.com/PokeAPI/sprites/master/pokemon/other/official-artwork/${getPokemonId(member.pokemonName)}.png`;
                        const memberData = applyAbilityModifiers(member.pokemonName, baseData, member.ability);

                        // Get offensive data for Back 2
                        const stabTypes = getStabTypes(member.pokemonName);
                        const offensiveCoverage = Array.from(getOffensiveCoverage(stabTypes)).slice(0, 4);
                        const weaknesses = getWeaknesses(memberData.damage_from);
                        const weaknessTypes = weaknesses.slice(0, 4).map(w => w.type);
                        const strengths = getStrengths(memberData.damage_from);
                        const immuneTypes = strengths.filter(s => s.label === 'Immune').map(s => s.type);
                        const resistTypes = strengths.filter(s => s.label !== 'Immune').map(s => s.type);

                        const threatBadges = offensiveCoverage.map(t =>
                            `<div class="type-badge type-${t}" style="font-size: 1.1em; padding: 6px 12px;">${t}</div>`
                        ).join('');
                        const weakBadges = weaknessTypes.map(t =>
                            `<div class="type-badge type-${t}" style="font-size: 1.1em; padding: 6px 12px;">${t}</div>`
                        ).join('');
                        const resistBadges = resistTypes.map(t =>
                            `<div class="type-badge type-${t}" style="font-size: 1em; padding: 5px 10px; opacity: 0.85;">${t}</div>`
                        ).join('');
                        const immuneBadges = immuneTypes.map(t =>
                            `<div class="type-badge type-${t}" style="font-size: 1em; padding: 5px 10px; background: rgba(255,255,255,0.15);">${t}</div>`
                        ).join('');

                        // Build protection list for this specific pivot
                        const protectionMap = [];
                        squadData.front2.forEach(lead => {
                            const leadBaseData = database[lead.pokemonName];
                            const leadData = applyAbilityModifiers(lead.pokemonName, leadBaseData, lead.ability);
                            const leadWeaknesses = getWeaknesses(leadData.damage_from);

                            const premiumTypes = [];
                            const softTypes = [];

                            leadWeaknesses.forEach(weakness => {
                                const multiplier = getDamageMultiplier(memberData.damage_from, weakness.type);
                                if (multiplier <= 0.5) {
                                    premiumTypes.push(weakness.type);
                                } else if (multiplier === 1.0) {
                                    softTypes.push(weakness.type);
                                }
                            });

                            if (premiumTypes.length > 0 || softTypes.length > 0) {
                                protectionMap.push({
                                    leadName: lead.pokemonName,
                                    premium: premiumTypes.slice(0, 3),
                                    soft: softTypes.slice(0, 3)
                                });
                            }
                        });

                        const protectionListItems = protectionMap.map(entry => {
                            let html = '';
                            if (entry.premium.length > 0) {
                                const premiumBadges = entry.premium.map(t =>
                                    `<div class="type-badge type-${t}" style="font-size: 1em; padding: 5px 10px;">${t}</div>`
                                ).join('');
                                html += `<li><span style="flex-shrink: 0;">•</span><div class="protection-text-wrap"><span style="color: #a8b8ff; font-weight: 700;">${capitalize(entry.leadName)}</span> from: <div class="protection-badges-container">${premiumBadges}</div></div></li>`;
                            }
                            if (entry.soft.length > 0) {
                                const softBadges = entry.soft.map(t =>
                                    `<div class="type-badge type-${t}" style="font-size: 0.85em; padding: 4px 8px; opacity: 0.7;">${t}</div>`
                                ).join('');
                                html += `<li><span style="flex-shrink: 0; color: #888;">◦</span><div class="protection-text-wrap"><span style="color: #999;">${capitalize(entry.leadName)}</span> from: <span style="color: #666; font-size: 11px;">(Neutral)</span> <div class="protection-badges-container">${softBadges}</div></div></li>`;
                            }
                            return html;
                        }).join('');

                        const protectionList = protectionListItems
                            ? `<ul class="protection-list">${protectionListItems}</ul>`
                            : '<div style="font-size: 12px; color: #666;">No direct coverage</div>';

                        return `
                            <div style="flex: 1; display: flex; flex-direction: column; gap: 8px;">
                                <div class="squad-sprite" style="background-image: url('${spriteUrl}')" title="${capitalize(member.pokemonName)}"></div>
                                <div style="padding: 8px; background: rgba(168,184,255,0.08); border-left: 2px solid #a8b8ff; border-radius: 4px;">
                                    <div style="font-size: 11px; font-weight: 700; color: #ffffff; margin-bottom: 6px;">⚔️ THREATENS</div>
                                    <div style="display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 8px;">${threatBadges}</div>
                                    <div style="font-size: 11px; font-weight: 700; color: #ffffff; margin-bottom: 6px;">⚠️ WEAK TO</div>
                                    <div style="display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 8px;">${weakBadges}</div>
                                    ${resistBadges ? '<div style="font-size: 11px; font-weight: 700; color: #ffffff; margin-bottom: 6px;">🛡️ RESISTS</div><div style="display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 8px;">' + resistBadges + '</div>' : ''}
                                    ${immuneBadges ? '<div style="font-size: 11px; font-weight: 700; color: #ffffff; margin-bottom: 8px;">🔒 IMMUNE</div><div style="display: flex; gap: 3px; flex-wrap: wrap; margin-bottom: 10px;">' + immuneBadges + '</div>' : ''}
                                    <div style="font-size: 11px; font-weight: 700; color: #ffffff; margin-bottom: 8px;">🚫 PROTECTS AGAINST</div>
                                    ${protectionList}
                                </div>
                            </div>
                        `;
                    }).join('');

                    const col1 = `
                        <div>
                            <h3 style="color: #7dd3fc;">Front 2 (Lead)</h3>
                            <div style="display: flex; gap: 16px; width: 100%;">
                                ${front2CapsuleHtml}
                            </div>

                            <h3 style="color: #a8b8ff; margin-top: 20px;">Back 2 (Pivot)</h3>
                            <div style="display: flex; gap: 16px; width: 100%;">
                                ${back2CapsuleHtml}
                            </div>
                        </div>
                    `;

                    // Column 2: Active Pivot Wheels
                    const cycleGroupMap = {};
                    synergy.perfectCycles.forEach(cycle => {
                        const key = [cycle.lead, cycle.bench].sort().join('|');
                        if (!cycleGroupMap[key]) {
                            cycleGroupMap[key] = {
                                lead: cycle.lead,
                                bench: cycle.bench,
                                leadCovers: new Set(),
                                benchCovers: new Set()
                            };
                        }
                        cycle.leadCoversFor.forEach(t => cycleGroupMap[key].leadCovers.add(t));
                        cycle.benchCoversFor.forEach(t => cycleGroupMap[key].benchCovers.add(t));
                    });

                    const perfectCyclesHtml = Object.values(cycleGroupMap).map(cycle => {
                        const leadSprite = database[cycle.lead]?.sprite || '';
                        const benchSprite = database[cycle.bench]?.sprite || '';
                        const leadBadges = Array.from(cycle.leadCovers).map(t =>
                            `<div class="type-badge type-${t}" style="font-size: 1.1em; padding: 6px 12px;">${t}</div>`
                        ).join('');
                        const benchBadges = Array.from(cycle.benchCovers).map(t =>
                            `<div class="type-badge type-${t}" style="font-size: 1.1em; padding: 6px 12px;">${t}</div>`
                        ).join('');

                        // Calculate combined offensive coverage (unique types hit SE by pair)
                        const combinedOffensiveTypes = new Set([...cycle.leadCovers, ...cycle.benchCovers]);
                        const combinedOffensiveBadges = Array.from(combinedOffensiveTypes).map(t =>
                            `<div class="type-badge type-${t}" style="font-size: 0.9em; padding: 4px 8px;">${t}</div>`
                        ).join('');

                        return `
                            <div class="playbook-cycle-box">
                                <div class="playbook-cycle-header">
                                    ${leadSprite ? '<img src="' + leadSprite + '" alt="' + capitalize(cycle.lead) + '" style="width: 48px; height: 48px; border-radius: 3px; border: 1px solid #7dd3fc;" title="' + capitalize(cycle.lead) + '" />' : '<span style="color: #7dd3fc; font-weight: 700;">' + capitalize(cycle.lead) + '</span>'}
                                    <span style="color: #888;">⇄</span>
                                    ${benchSprite ? '<img src="' + benchSprite + '" alt="' + capitalize(cycle.bench) + '" style="width: 48px; height: 48px; border-radius: 3px; border: 1px solid #a8b8ff;" title="' + capitalize(cycle.bench) + '" />' : '<span style="color: #a8b8ff; font-weight: 700;">' + capitalize(cycle.bench) + '</span>'}
                                </div>
                                <div class="playbook-cycle-details">
                                    <div>↳ ${capitalize(cycle.bench)} shields ${capitalize(cycle.lead)} from: <span style="display: inline-flex; gap: 2px; flex-wrap: wrap;">${benchBadges}</span></div>
                                    <div>↳ ${capitalize(cycle.lead)} shields ${capitalize(cycle.bench)} from: <span style="display: inline-flex; gap: 2px; flex-wrap: wrap;">${leadBadges}</span></div>
                                </div>
                                <div class="pivot-synergy-note">Hits SE: <span style="display: inline-flex; gap: 2px; flex-wrap: wrap;">${combinedOffensiveBadges}</span></div>
                            </div>
                        `;
                    }).join('');

                    const col2 = `
                        <div>
                            <h3 style="color: #7dd3fc;">🔄 Pivot Wheels</h3>
                            <div class="playbook-cycle-list">
                                ${perfectCyclesHtml || '<span style="color: #999; font-size: 12px;">No perfect cycles</span>'}
                            </div>
                        </div>
                    `;

                    return `
                        <div class="playbook-content">
                            ${col1}
                            ${col2}
                        </div>
                    `;
                }

                // Create composition selector with buttons
                const compositionButtonsHtml = bestTop4.map((_, index) => {
                    const scoreRounded = Math.round(bestTop4[index].bestScore * 10) / 10;
                    const isActive = index === 0 ? 'true' : 'false';
                    return `
                        <button class="composition-selector" data-index="${index}" data-active="${isActive}" style="
                            padding: 4px 8px;
                            background: ${index === 0 ? 'rgba(251, 191, 36, 0.2)' : 'transparent'};
                            border: 1px solid ${index === 0 ? '#fbbf24' : '#2d2a4a'};
                            color: ${index === 0 ? '#fbbf24' : '#7dd3fc'};
                            border-radius: 6px;
                            font-weight: 700;
                            cursor: pointer;
                            font-size: 11px;
                            transition: all 0.3s ease;
                            white-space: nowrap;
                        ">
                            ${index + 1} (${scoreRounded})
                        </button>
                    `;
                }).join('');

                const compositionCardsHtml = bestTop4.map((squadData, index) => {
                    const scoreRounded = Math.round(squadData.bestScore * 10) / 10;
                    const content = renderPlaybook(squadData);
                    return `
                        <div class="squad-composition-card" data-index="${index}" style="
                            display: ${index === 0 ? 'block' : 'none'};
                            background: #191729;
                            border: 1px solid #2d2a4a;
                            border-radius: 12px;
                            padding: 20px;
                            position: relative;
                            width: 100%;
                            box-sizing: border-box;
                        ">
                            <div style="
                                position: absolute;
                                top: 12px;
                                right: 12px;
                                background: rgba(251, 191, 36, 0.15);
                                border: 1px solid #fbbf24;
                                color: #fbbf24;
                                padding: 6px 12px;
                                border-radius: 6px;
                                font-weight: 700;
                                font-size: 14px;
                            ">
                                ${scoreRounded}
                            </div>
                            ${content}
                        </div>
                    `;
                }).join('');

                // Render composition buttons into the HUD
                const buttonContainer = document.getElementById('compositionButtonsContainer');
                if (buttonContainer) {
                    buttonContainer.innerHTML = compositionButtonsHtml;
                }

                // Render composition cards
                squadGrid.innerHTML = compositionCardsHtml;

                // Add button event listeners
                setTimeout(() => {
                    const buttons = document.querySelectorAll('.composition-selector');
                    const cards = document.querySelectorAll('.squad-composition-card');

                    buttons.forEach(button => {
                        button.addEventListener('click', () => {
                            const index = parseInt(button.dataset.index);

                            // Update button styles
                            buttons.forEach(b => {
                                b.style.background = 'transparent';
                                b.style.borderColor = '#2d2a4a';
                                b.style.color = '#7dd3fc';
                            });
                            button.style.background = 'rgba(251, 191, 36, 0.2)';
                            button.style.borderColor = '#fbbf24';
                            button.style.color = '#fbbf24';

                            // Show selected card, hide others
                            cards.forEach(card => {
                                card.style.display = parseInt(card.dataset.index) === index ? 'block' : 'none';
                            });
                        });
                    });
                }, 0);
            } else {
                squadSection.style.display = 'none';
            }
        }

        function analyzeSquadSynergy(squad, front2, back2) {
            // Get all offensive types covered by the squad
            const allSquadTypes = [];
            squad.forEach(member => {
                allSquadTypes.push(...getStabTypes(member.pokemonName));
            });
            const uniqueSquadTypes = [...new Set(allSquadTypes)];
            const offensiveCoverage = getOffensiveCoverage(uniqueSquadTypes);

            // Build comprehensive threat-to-answer mapping
            const threatAnswers = []; // Array of { threat: type, lead: name, answerer: name, saveType: 'premium'|'soft' }
            const perfectCycles = []; // Array of { lead: name, bench: name, leadCovers: [types], benchCovers: [types] }

            // For each front 2 lead
            front2.forEach(frontMember => {
                const baseData = database[frontMember.pokemonName];
                const frontData = applyAbilityModifiers(frontMember.pokemonName, baseData, frontMember.ability);
                const frontWeaknesses = getWeaknesses(frontData.damage_from);
                const frontStrengths = getStrengths(frontData.damage_from);
                const frontResistTypes = frontStrengths.map(s => s.type);

                // For each weakness of this lead
                frontWeaknesses.forEach(weakness => {
                    // Find which back 2 member covers this (premium or soft)
                    back2.forEach(backMember => {
                        const backBaseData = database[backMember.pokemonName];
                        const backData = applyAbilityModifiers(backMember.pokemonName, backBaseData, backMember.ability);
                        const backStrengths = getStrengths(backData.damage_from);
                        const backWeaknesses = getWeaknesses(backData.damage_from);
                        const backWeakTypes = backWeaknesses.map(w => w.type);

                        // Check for PREMIUM save: back member takes <= 0.5x (includes immunities)
                        const multiplier = getDamageMultiplier(backData.damage_from, weakness.type);
                        let saveType = null;
                        if (multiplier <= 0.5) {
                            saveType = 'premium';
                        } else if (multiplier === 1.0) {
                            saveType = 'soft';
                        }

                        if (saveType) {
                            threatAnswers.push({
                                threat: weakness.type,
                                lead: frontMember.pokemonName,
                                answerer: backMember.pokemonName,
                                saveType: saveType
                            });

                            // NOW CHECK REVERSE PATH: Does the lead cover the bench's weaknesses?
                            const benchtypeCovered = backWeakTypes.filter(bwType =>
                                frontResistTypes.includes(bwType)
                            );

                            if (benchtypeCovered.length > 0) {
                                // This is a perfect pivot cycle!
                                perfectCycles.push({
                                    lead: frontMember.pokemonName,
                                    bench: backMember.pokemonName,
                                    leadCoversFor: benchtypeCovered.sort(),
                                    benchCoversFor: [weakness.type]
                                });
                            }
                        }
                    });
                });
            });

            // Get all weaknesses of front 2
            const frontWeaknesses = [];
            front2.forEach(frontMember => {
                const baseData = database[frontMember.pokemonName];
                const data = applyAbilityModifiers(frontMember.pokemonName, baseData, frontMember.ability);
                const weaknesses = getWeaknesses(data.damage_from);
                weaknesses.forEach(w => {
                    if (!frontWeaknesses.find(fw => fw.type === w.type)) {
                        frontWeaknesses.push(w);
                    }
                });
            });

            // Identify which weaknesses are covered by back 2 (with two-tiered weighting)
            const coveredWeaknesses = [];
            const uncoveredWeaknesses = [];
            let defensiveCoverageScore = 0; // Weighted score: 1.0 for premium, 0.3 for soft

            frontWeaknesses.forEach(weakness => {
                let coverage = null; // 'premium', 'soft', or null

                back2.forEach(backMember => {
                    const backBaseData = database[backMember.pokemonName];
                    const backData = applyAbilityModifiers(backMember.pokemonName, backBaseData, backMember.ability);

                    // Check multiplier for premium/soft save
                    const multiplier = getDamageMultiplier(backData.damage_from, weakness.type);
                    if (multiplier <= 0.5) {
                        coverage = 'premium';
                    } else if (!coverage && multiplier === 1.0) {
                        coverage = 'soft';
                    }
                });

                if (coverage) {
                    coveredWeaknesses.push(weakness.type);
                    defensiveCoverageScore += (coverage === 'premium' ? 1.0 : 0.3);
                } else {
                    uncoveredWeaknesses.push(weakness.type);
                }
            });

            return {
                offensiveTypes: Array.from(offensiveCoverage).sort(),
                frontWeaknesses: frontWeaknesses.map(w => w.type),
                coveredWeaknesses: coveredWeaknesses.sort(),
                uncoveredWeaknesses: uncoveredWeaknesses.sort(),
                defensiveCoverageScore: defensiveCoverageScore,
                threatAnswers: threatAnswers,
                perfectCycles: perfectCycles,
                synergySBonus: perfectCycles.length * 5 // +5 per perfect cycle
            };
        }

        function capitalize(str) {
            return str
                .split('-')
                .map(word => word.charAt(0).toUpperCase() + word.slice(1))
                .join(' ');
        }

        // Simple Pokédex ID lookup (fallback to index)
        function getPokemonId(name) {
            const ids = {
                'bulbasaur': 1, 'ivysaur': 2, 'venusaur': 3, 'charmander': 4, 'charmeleon': 5,
                'charizard': 6, 'squirtle': 7, 'wartortle': 8, 'blastoise': 9, 'caterpie': 10,
                'pidgeot': 18, 'pidgeotto': 17, 'pidgeey': 16
            };
            return ids[name] || 1;
        }
    </script>
